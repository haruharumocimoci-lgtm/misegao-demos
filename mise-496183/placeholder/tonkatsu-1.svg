<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="t1-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="1" stop-color="#eae2d0"/>
    </linearGradient>
    <linearGradient id="t1-tray" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a352e"/>
      <stop offset="1" stop-color="#2f2b26"/>
    </linearGradient>
    <linearGradient id="t1-crust" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d19a4a"/>
      <stop offset="1" stop-color="#a56b2a"/>
    </linearGradient>
    <linearGradient id="t1-bowl" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a3492f"/>
      <stop offset="1" stop-color="#7c3323"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#t1-bg)"/>
  <circle cx="680" cy="90" r="52" fill="none" stroke="#b5985a" stroke-width="2.5" opacity="0.5"/>
  <path d="M60 520 q 200 14 340 6 t 340 -8" stroke="#2f2b26" stroke-width="3" opacity="0.08" fill="none"/>
  <!-- 膳の影 -->
  <ellipse cx="400" cy="470" rx="310" ry="26" fill="#2f2b26" opacity="0.14"/>
  <!-- 折敷（膳） -->
  <rect x="110" y="230" width="580" height="226" rx="14" fill="url(#t1-tray)"/>
  <rect x="122" y="242" width="556" height="202" rx="10" fill="none" stroke="#b5985a" stroke-width="2" opacity="0.45"/>
  <!-- とんかつ皿（奥・メイン） -->
  <g transform="translate(400 268)">
    <ellipse cx="0" cy="34" rx="180" ry="40" fill="#ece5d4"/>
    <ellipse cx="0" cy="30" rx="168" ry="34" fill="#f6f2e8"/>
    <!-- キャベツ -->
    <g transform="translate(92 14)">
      <ellipse cx="0" cy="10" rx="62" ry="20" fill="#c8d9a0"/>
      <ellipse cx="-6" cy="0" rx="52" ry="18" fill="#dce8bc"/>
      <g stroke="#a9c37e" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8">
        <path d="M-36 4 q 16 -10 36 -6"/>
        <path d="M-14 14 q 20 -8 40 -2"/>
      </g>
    </g>
    <!-- かつ3切れ -->
    <g transform="translate(-124 -14)">
      <path d="M0 20 q 6 -24 42 -26 l 5 66 q -38 4 -47 -18 z" fill="url(#t1-crust)"/>
      <path d="M6 22 q 6 -18 34 -20 l 4 54 q -28 2 -38 -14 z" fill="#e8b98a"/>
      <path d="M11 24 q 6 -12 26 -15 l 3 44 q -20 1 -29 -10 z" fill="#f6e0cd"/>
    </g>
    <g transform="translate(-72 -18)">
      <path d="M0 22 q 6 -26 44 -28 l 5 70 q -40 4 -49 -20 z" fill="url(#t1-crust)"/>
      <path d="M6 24 q 6 -20 36 -22 l 4 58 q -30 2 -40 -16 z" fill="#e8b98a"/>
      <path d="M11 26 q 6 -13 28 -16 l 3 47 q -22 1 -31 -11 z" fill="#f6e0cd"/>
    </g>
    <g transform="translate(-16 -16)">
      <path d="M0 21 q 6 -25 43 -27 l 5 68 q -39 4 -48 -19 z" fill="url(#t1-crust)"/>
      <path d="M6 23 q 6 -19 35 -21 l 4 56 q -29 2 -39 -15 z" fill="#e8b98a"/>
      <path d="M11 25 q 6 -12 27 -15 l 3 45 q -21 1 -30 -10 z" fill="#f6e0cd"/>
    </g>
    <!-- レモン -->
    <g transform="translate(-160 34)">
      <path d="M-22 0 a 22 22 0 0 1 44 0 z" fill="#f2d24b"/>
      <path d="M-17 -2 a 17 17 0 0 1 34 0 z" fill="#f9e98e"/>
    </g>
  </g>
  <!-- 汁椀（左手前・朱塗り） -->
  <g transform="translate(212 366)">
    <ellipse cx="0" cy="72" rx="60" ry="9" fill="#000000" opacity="0.2"/>
    <path d="M-56 18 q 6 50 56 60 q 50 -10 56 -60 z" fill="url(#t1-bowl)"/>
    <path d="M-50 18 a 50 26 0 0 1 100 0 z" fill="#b0543a"/>
    <ellipse cx="0" cy="-4" rx="30" ry="9" fill="#9c3f2e"/>
    <path d="M-56 18 l 112 0" stroke="#5f2718" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- 飯椀（中央手前・白磁） -->
  <g transform="translate(400 372)">
    <ellipse cx="0" cy="66" rx="56" ry="8" fill="#000000" opacity="0.18"/>
    <path d="M-52 14 q 6 46 52 56 q 46 -10 52 -56 z" fill="#f6f2e8" stroke="#ddd5c4" stroke-width="3"/>
    <path d="M-46 14 a 46 20 0 0 1 92 0 q -20 -24 -46 -24 q -26 0 -46 24 z" fill="#ffffff"/>
    <circle cx="-14" cy="0" r="4.5" fill="#f0ead9"/><circle cx="10" cy="-6" r="4.5" fill="#f0ead9"/>
    <circle cx="24" cy="4" r="4.5" fill="#f0ead9"/>
  </g>
  <!-- 小鉢（右手前・お新香） -->
  <g transform="translate(568 380)">
    <ellipse cx="0" cy="54" rx="46" ry="7" fill="#000000" opacity="0.16"/>
    <path d="M-42 6 q 4 38 42 48 q 38 -10 42 -48 z" fill="#48604e"/>
    <ellipse cx="0" cy="6" rx="42" ry="12" fill="#3a4f40"/>
    <ellipse cx="0" cy="6" rx="33" ry="9" fill="#5d7d5e"/>
    <circle cx="-12" cy="2" r="7" fill="#e2c393"/>
    <circle cx="6" cy="6" r="7" fill="#d9a844"/>
    <circle cx="18" cy="0" r="6" fill="#c0503c"/>
  </g>
  <!-- 箸 -->
  <g transform="rotate(-2 400 500)">
    <rect x="180" y="492" width="440" height="7" rx="3.5" fill="#7a5a38"/>
    <rect x="180" y="503" width="440" height="7" rx="3.5" fill="#8a6a44"/>
    <rect x="206" y="484" width="34" height="32" rx="6" fill="#b5985a" opacity="0.9"/>
  </g>
  <g fill="#b5985a">
    <circle cx="120" cy="120" r="3" opacity="0.45"/><circle cx="560" cy="80" r="3" opacity="0.4"/>
    <circle cx="720" cy="200" r="3" opacity="0.35"/>
  </g>
</svg>
