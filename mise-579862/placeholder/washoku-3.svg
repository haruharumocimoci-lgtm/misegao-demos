<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="t-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="1" stop-color="#eae2d0"/>
    </linearGradient>
    <linearGradient id="t-koromo" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f2dfae"/>
      <stop offset="1" stop-color="#e3c581"/>
    </linearGradient>
    <linearGradient id="t-zara" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5a5148"/>
      <stop offset="1" stop-color="#2f2b26"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#t-bg)"/>
  <circle cx="688" cy="100" r="50" fill="none" stroke="#b5985a" stroke-width="2.5" opacity="0.5"/>
  <path d="M60 100 q 260 -16 440 -6 t 240 12" stroke="#2f2b26" stroke-width="3" opacity="0.07" fill="none"/>
  <!-- 皿の影 -->
  <ellipse cx="390" cy="470" rx="300" ry="28" fill="#2f2b26" opacity="0.15"/>
  <!-- 角皿 -->
  <g transform="rotate(-2 390 400)">
    <rect x="110" y="330" width="560" height="150" rx="12" fill="url(#t-zara)"/>
    <rect x="122" y="342" width="536" height="126" rx="8" fill="none" stroke="#b5985a" stroke-width="2" opacity="0.45"/>
  </g>
  <!-- 敷き紙 -->
  <path d="M150 350 l 480 -8 l 14 100 l -470 14 z" fill="#fbf8f0" opacity="0.95"/>
  <path d="M150 350 l 480 -8 l 3 22 l -478 12 z" fill="#f0ead9"/>
  <!-- 海老天 2本 -->
  <g transform="rotate(-14 330 350)">
    <path d="M250 330 q -6 -60 26 -104 q 16 -22 38 -26 q -6 30 4 52 q 12 26 4 56 q -30 26 -72 22 z" fill="url(#t-koromo)"/>
    <path d="M258 320 q -2 -48 24 -84" stroke="#d3a95c" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M312 196 q 8 -18 4 -34 q 16 4 20 20 q 4 14 -8 26 q -10 -4 -16 -12 z" fill="#c1543c"/>
    <path d="M322 176 l 14 -20 M330 182 l 20 -14" stroke="#c1543c" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="rotate(-4 430 340) translate(96 8)">
    <path d="M250 330 q -6 -60 26 -104 q 16 -22 38 -26 q -6 30 4 52 q 12 26 4 56 q -30 26 -72 22 z" fill="url(#t-koromo)"/>
    <path d="M258 320 q -2 -48 24 -84" stroke="#d3a95c" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M312 196 q 8 -18 4 -34 q 16 4 20 20 q 4 14 -8 26 q -10 -4 -16 -12 z" fill="#c1543c"/>
    <path d="M322 176 l 14 -20 M330 182 l 20 -14" stroke="#c1543c" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- 南瓜天 -->
  <g transform="rotate(6 500 388)">
    <path d="M452 356 a 52 40 0 0 1 104 6 l -6 30 l -94 2 z" fill="url(#t-koromo)"/>
    <path d="M452 392 l 100 -2 l 2 12 l -102 2 z" fill="#3f5a3a"/>
  </g>
  <!-- 蓮根天 -->
  <g transform="translate(590 372)">
    <circle cx="0" cy="0" r="42" fill="url(#t-koromo)"/>
    <circle cx="0" cy="0" r="34" fill="#f4e7c2"/>
    <g fill="#e0cd96">
      <circle cx="0" cy="-16" r="7"/><circle cx="14" cy="-6" r="7"/><circle cx="10" cy="12" r="7"/>
      <circle cx="-10" cy="12" r="7"/><circle cx="-14" cy="-6" r="7"/><circle cx="0" cy="1" r="6"/>
    </g>
  </g>
  <!-- 大葉天 -->
  <path d="M196 396 q 48 -26 92 2 q -44 30 -92 -2 z" fill="#4c6b4f"/>
  <path d="M204 396 q 40 -2 78 2" stroke="#37503b" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- 天つゆと大根おろし -->
  <g transform="translate(676 260)">
    <ellipse cx="0" cy="52" rx="52" ry="8" fill="#2f2b26" opacity="0.14"/>
    <path d="M-46 -6 q 2 44 46 54 q 44 -10 46 -54 z" fill="#8f4a38"/>
    <ellipse cx="0" cy="-6" rx="46" ry="13" fill="#5f2e22"/>
    <ellipse cx="0" cy="-5" rx="38" ry="10" fill="#7c3b2b"/>
    <ellipse cx="10" cy="-7" rx="14" ry="6" fill="#f0ebdd"/>
    <path d="M-46 -6 q 2 44 46 54" fill="none" stroke="#b5985a" stroke-width="2.5" opacity="0.55"/>
  </g>
  <!-- 湯気 -->
  <g fill="none" stroke="#2f2b26" stroke-width="5" stroke-linecap="round" opacity="0.10">
    <path d="M310 150 C 296 118 322 96 308 66"/>
    <path d="M420 170 C 406 140 432 116 418 88"/>
  </g>
  <g fill="#b5985a">
    <circle cx="130" cy="150" r="3" opacity="0.45"/><circle cx="560" cy="120" r="3" opacity="0.4"/>
    <circle cx="90" cy="260" r="3" opacity="0.35"/>
  </g>
</svg>
