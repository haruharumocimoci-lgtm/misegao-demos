<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="k-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="1" stop-color="#eae2d0"/>
    </linearGradient>
    <linearGradient id="k-tray" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a352e"/>
      <stop offset="1" stop-color="#2f2b26"/>
    </linearGradient>
    <linearGradient id="k-bowl" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a3492f"/>
      <stop offset="1" stop-color="#7c3323"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#k-bg)"/>
  <circle cx="680" cy="90" r="52" fill="none" stroke="#b5985a" stroke-width="2.5" opacity="0.5"/>
  <path d="M60 520 q 200 14 340 6 t 340 -8" stroke="#2f2b26" stroke-width="3" opacity="0.08" fill="none"/>
  <!-- 膳の影 -->
  <ellipse cx="400" cy="470" rx="310" ry="26" fill="#2f2b26" opacity="0.14"/>
  <!-- 折敷（膳） -->
  <rect x="110" y="240" width="580" height="216" rx="14" fill="url(#k-tray)"/>
  <rect x="122" y="252" width="556" height="192" rx="10" fill="none" stroke="#b5985a" stroke-width="2" opacity="0.45"/>
  <!-- 汁椀（朱塗り・蓋つき） -->
  <g transform="translate(212 330)">
    <ellipse cx="0" cy="82" rx="66" ry="10" fill="#000000" opacity="0.2"/>
    <path d="M-62 22 q 6 56 62 66 q 56 -10 62 -66 z" fill="url(#k-bowl)"/>
    <path d="M-56 22 a 56 30 0 0 1 112 0 z" fill="#b0543a"/>
    <ellipse cx="0" cy="-2" rx="34" ry="10" fill="#9c3f2e"/>
    <circle cx="0" cy="-10" r="9" fill="#7c3323"/>
    <path d="M-62 22 l 124 0" stroke="#5f2718" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- 飯椀（白磁・ご飯） -->
  <g transform="translate(400 336)">
    <ellipse cx="0" cy="76" rx="60" ry="9" fill="#000000" opacity="0.18"/>
    <path d="M-56 16 q 6 52 56 62 q 50 -10 56 -62 z" fill="#f6f2e8" stroke="#ddd5c4" stroke-width="3"/>
    <path d="M-50 16 a 50 22 0 0 1 100 0 q -22 -26 -50 -26 q -28 0 -50 26 z" fill="#ffffff"/>
    <circle cx="-16" cy="0" r="5" fill="#f0ead9"/><circle cx="10" cy="-6" r="5" fill="#f0ead9"/>
    <circle cx="26" cy="4" r="5" fill="#f0ead9"/>
    <path d="M-56 16 q 6 52 56 62" fill="none" stroke="#b5985a" stroke-width="2.5" opacity="0.6"/>
  </g>
  <!-- 向付（小鉢・お浸し） -->
  <g transform="translate(566 348)">
    <ellipse cx="0" cy="62" rx="52" ry="8" fill="#000000" opacity="0.16"/>
    <path d="M-48 8 q 4 44 48 54 q 44 -10 48 -54 z" fill="#48604e"/>
    <ellipse cx="0" cy="8" rx="48" ry="14" fill="#3a4f40"/>
    <ellipse cx="0" cy="8" rx="38" ry="10" fill="#5d7d5e"/>
    <path d="M-20 4 q 10 -14 24 -8 M-2 8 q 14 -12 26 -2" stroke="#7a9455" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="0" r="4" fill="#e2c393"/>
  </g>
  <!-- 八寸皿（奥・小さく） -->
  <g transform="translate(300 258)">
    <ellipse cx="0" cy="0" rx="72" ry="18" fill="#ddd5c4"/>
    <ellipse cx="0" cy="-2" rx="62" ry="14" fill="#ece5d4"/>
    <circle cx="-26" cy="-4" r="8" fill="#9c3f2e"/>
    <circle cx="0" cy="-6" r="8" fill="#e2a63d"/>
    <path d="M20 -12 q 22 -4 30 8 q -20 8 -30 -8 z" fill="#4c6b4f"/>
  </g>
  <!-- 猪口（奥） -->
  <g transform="translate(508 262)">
    <ellipse cx="0" cy="18" rx="26" ry="5" fill="#000000" opacity="0.14"/>
    <path d="M-22 -6 q 2 24 22 28 q 20 -4 22 -28 z" fill="#f6f2e8" stroke="#ddd5c4" stroke-width="2"/>
    <ellipse cx="0" cy="-6" rx="22" ry="6" fill="#e9e2d2"/>
  </g>
  <!-- 箸 -->
  <g transform="rotate(-2 400 500)">
    <rect x="180" y="492" width="440" height="7" rx="3.5" fill="#7a5a38"/>
    <rect x="180" y="503" width="440" height="7" rx="3.5" fill="#8a6a44"/>
    <rect x="206" y="484" width="34" height="32" rx="6" fill="#b5985a" opacity="0.9"/>
  </g>
  <g fill="#b5985a">
    <circle cx="120" cy="120" r="3" opacity="0.45"/><circle cx="560" cy="80" r="3" opacity="0.4"/>
    <circle cx="720" cy="200" r="3" opacity="0.35"/>
  </g>
</svg>
